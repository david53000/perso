                                        <div><label className="block text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-1.5">Adresse</label><input type="text" required value={activityForm.address} onChange={(e) => setActivityForm({...activityForm, address: e.target.value})} className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" /></div>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-1.5">Pays</label>
                                                <input type="text" value={activityForm.country || ''} onChange={(e) => setActivityForm({...activityForm, country: e.target.value})} placeholder="Ex: Japon" className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-1.5">Durée</label>
                                                <input type="text" value={activityForm.duration || ''} onChange={(e) => setActivityForm({...activityForm, duration: e.target.value})} placeholder="Ex: 1h30, 2h..." className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" />
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-1.5">Planifier (Jour)</label>
                                                <select value={activityForm.dayId} onChange={(e) => setActivityForm({...activityForm, dayId: e.target.value})} className="w-full p-2.5 border border-zinc-200 rounded-lg bg-white text-sm focus:outline-none focus:border-indigo-500"><option value="">À faire</option>{settings.days.map(d => <option key={d.id} value={d.id}>{getDayDisplayName(d.id)}</option>)}</select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-1.5">Type</label>
                                                <select value={activityForm.type} onChange={(e) => {
                                                    const newType = e.target.value;
                                                    let newDuration = activityForm.duration;
                                                    if (newType === 'restaurant' && !newDuration) newDuration = '1h30';
                                                    setActivityForm({...activityForm, type: newType, duration: newDuration});
                                                }} className="w-full p-2.5 border border-zinc-200 rounded-lg bg-white text-sm focus:outline-none focus:border-indigo-500">
                                                    <option value="visite">Lieu / Visite</option>
                                                    <option value="restaurant">Restaurant</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-1.5 flex items-center gap-1.5">
                                                <Icon name="list" size={14} /> Commentaires / Astuces
                                            </label>
                                            <textarea value={activityForm.notes || ''} onChange={(e) => setActivityForm({...activityForm, notes: e.target.value})} placeholder="À ne pas manquer, plat signature, prix d'entrée..." className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 min-h-[80px]"></textarea>
                                        </div>

                                        <div><label className="block text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-1.5">Lien / URL vidéo (Optionnel)</label><input type="url" value={activityForm.url || ''} onChange={(e) => setActivityForm({...activityForm, url: e.target.value})} placeholder="https://..." className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" /></div>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-1.5">Planifier (Jour)</label>
                                                <select value={activityForm.dayId} onChange={(e) => setActivityForm({...activityForm, dayId: e.target.value})} className="w-full p-2.5 border border-zinc-200 rounded-lg bg-white text-sm focus:outline-none focus:border-indigo-500"><option value="">À faire</option>{settings.days.map(d => <option key={d.id} value={d.id}>{getDayDisplayName(d.id)}</option>)}</select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-1.5">Moment</label>
                                                <select value={activityForm.period || 'morning'} onChange={(e) => setActivityForm({...activityForm, period: e.target.value})} className="w-full p-2.5 border border-zinc-200 rounded-lg bg-white text-sm focus:outline-none focus:border-indigo-500">
                                                    {PERIODS.map(p => <option key={p.id} value={p.id}>{p.icon} {p.label}</option>)}
                                                </select>
                                            </div>
                                        </div>

                                        {activityForm.dayId && (
                                            <div>
                                                <label className="block text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-1.5">Heure (Optionnel)</label>
                                                <input type="time" value={activityForm.time} onChange={(e) => setActivityForm({...activityForm, time: e.target.value})} className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" />
                                            </div>
                                        )}
                                        <button type="submit" className="w-full bg-indigo-600 text-white font-medium py-3 rounded-lg mt-2 hover:bg-indigo-700 transition-colors">Sauvegarder</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Modal Journal Éditeur */}
                        {isJournalModalOpen && editingActivity && (
                            <JournalEditorModal activity={editingActivity} onClose={() => setIsJournalModalOpen(false)} onSave={saveJournalEntry} handleImageUpload={handleImageUpload} handleRewriteJournalAi={handleRewriteJournalAi} isAiRewriting={isAiRewriting} days={settings.days} getDayDisplayName={getDayDisplayName} />
                        )}
                    </div>
                </div>
            );
        }

        // Composant Editeur Journal
        function JournalEditorModal({ activity, onClose, onSave, handleImageUpload, handleRewriteJournalAi, isAiRewriting, days, getDayDisplayName }) {
            const isNew = !activity.id;
            const [name, setName] = useState(activity.name || '');
            const [address, setAddress] = useState(activity.address || '');
            const [dayId, setDayId] = useState(activity.dayId || (days[0]?.id || ''));
            const [time, setTime] = useState(activity.time || '12:00');
            const [notes, setNotes] = useState(activity.notes || '');
            const [isLocating, setIsLocating] = useState(false);
            const [photos, setPhotos] = useState(activity.photos || (activity.photoBase64 ? [activity.photoBase64] : []));
            const cameraInputRef = useRef(null);
            const galleryInputRef = useRef(null);

            const handleLocateMe = () => {
                setIsLocating(true);
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => { setAddress(`${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`); setIsLocating(false); }, err => { alert("Erreur GPS"); setIsLocating(false); }, { enableHighAccuracy: true });
                } else setIsLocating(false);
            };

            return (
                <div className="fixed inset-0 bg-zinc-900/40 backdrop-blur-sm z-50 flex flex-col justify-end">
                    <div className="bg-white rounded-t-2xl w-full max-w-md mx-auto max-h-[90vh] flex flex-col animate-in slide-in-from-bottom-4 duration-200">
                        <div className="sticky top-0 bg-white border-b border-zinc-100 px-5 py-4 flex justify-between items-center z-10">
                            <h3 className="font-semibold text-zinc-900">{isNew ? 'Nouveau Souvenir' : 'Éditer'}</h3>
                            <button onClick={onClose} className="p-2 text-zinc-400 hover:text-zinc-900 bg-zinc-100 rounded-full"><Icon name="x" size={18} /></button>
                        </div>
                        <div className="p-5 overflow-y-auto space-y-6 pb-20">
                            
                            <div className="space-y-4 bg-teal-50/30 p-4 rounded-xl border border-teal-100">
                                <div><label className="text-xs font-semibold text-teal-800 uppercase tracking-wide">Événement</label><input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full mt-1 p-2.5 border border-teal-200 rounded-lg text-sm focus:outline-none focus:border-teal-500" /></div>
                                <div>
                                    <label className="text-xs font-semibold text-teal-800 uppercase tracking-wide">Lieu</label>
                                    <div className="flex gap-2 mt-1">
                                        <input type="text" value={address} onChange={e => setAddress(e.target.value)} className="flex-1 p-2.5 border border-teal-200 rounded-lg text-sm focus:outline-none focus:border-teal-500" />
                                        <button onClick={handleLocateMe} className="bg-teal-100 text-teal-700 px-3.5 rounded-lg flex items-center justify-center hover:bg-teal-200 transition-colors">{isLocating ? <Icon name="loader" size={16} className="animate-spin" /> : <Icon name="pin" size={16} />}</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div><label className="text-xs font-semibold text-teal-800 uppercase tracking-wide">Jour</label><select value={dayId} onChange={e => setDayId(e.target.value)} className="w-full mt-1 p-2.5 border border-teal-200 rounded-lg text-sm focus:outline-none focus:border-teal-500 bg-white">{days.map(d => <option key={d.id} value={d.id}>{getDayDisplayName(d.id)}</option>)}</select></div>
                                    <div><label className="text-xs font-semibold text-teal-800 uppercase tracking-wide">Heure</label><input type="time" value={time} onChange={e => setTime(e.target.value)} className="w-full mt-1 p-2.5 border border-teal-200 rounded-lg text-sm focus:outline-none focus:border-teal-500" /></div>
                                </div>
                            </div>

                            <div>
                                <label className="flex items-center gap-1.5 text-xs font-semibold text-zinc-500 uppercase tracking-wide mb-2"><Icon name="camera" size={14} /> Photos</label>
                                <div className="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
                                    {photos.map((p, idx) => (
                                        <div key={idx} className="relative flex-shrink-0 w-24 h-24 rounded-lg border border-zinc-200 overflow-hidden">
                                            <img src={p} className="w-full h-full object-cover" />
                                            <button onClick={() => setPhotos(photos.filter((_, i) => i !== idx))} className="absolute top-1 right-1 bg-red-500/90 text-white rounded-md p-1 hover:bg-red-600"><Icon name="x" size={12} /></button>
                                        </div>
                                    ))}
                                    <div onClick={() => cameraInputRef.current?.click()} className="flex-shrink-0 w-24 h-24 rounded-lg border-2 border-dashed border-zinc-300 bg-zinc-50 flex flex-col items-center justify-center cursor-pointer text-zinc-400 hover:text-zinc-600 hover:border-zinc-400 transition-colors">
                                        <Icon name="camera" size={22} className="mb-1" />
                                        <span className="text-[10px] font-bold uppercase">Prendre</span>
                                    </div>
                                    <div onClick={() => galleryInputRef.current?.click()} className="flex-shrink-0 w-24 h-24 rounded-lg border-2 border-dashed border-zinc-300 bg-zinc-50 flex flex-col items-center justify-center cursor-pointer text-zinc-400 hover:text-zinc-600 hover:border-zinc-400 transition-colors">
                                        <Icon name="image" size={22} className="mb-1" />
                                        <span className="text-[10px] font-bold uppercase">Galerie</span>
                                    </div>
                                </div>
                                <input type="file" accept="image/*" capture="environment" ref={cameraInputRef} className="hidden" onChange={(e) => handleImageUpload(e, (newPhotos) => setPhotos(prev => [...prev, ...newPhotos]))} />
                                <input type="file" accept="image/*" multiple ref={galleryInputRef} className="hidden" onChange={(e) => handleImageUpload(e, (newPhotos) => setPhotos(prev => [...prev, ...newPhotos]))} />
                            </div>

                            <div>
                                <div className="flex justify-between items-end mb-2">
                                    <label className="flex items-center gap-1.5 text-xs font-semibold text-zinc-500 uppercase tracking-wide"><Icon name="book" size={14} /> Notes</label>
                                    <button onClick={() => handleRewriteJournalAi(notes, setNotes)} disabled={!notes || isAiRewriting} className="text-xs font-medium text-teal-700 bg-teal-50 px-3 py-1.5 rounded-md hover:bg-teal-100 flex items-center gap-1 transition-colors">
                                        {isAiRewriting ? <Icon name="loader" size={12} className="animate-spin" /> : <Icon name="sparkles" size={12} />} IA
                                    </button>
                                </div>
                                <textarea value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Vos souvenirs ici..." className="w-full p-3 border border-zinc-200 rounded-lg text-sm h-32 focus:outline-none focus:border-teal-500"></textarea>
                            </div>

                            <button onClick={() => onSave({ id: activity.id, name, address, country: activity.country || '', duration: activity.duration || '', dayId, time, notes, photos, type: activity.type || 'visite', url: activity.url || '', period: activity.period || 'morning' })} disabled={!name} className="w-full bg-teal-600 text-white font-medium py-3 rounded-lg flex items-center justify-center gap-2 disabled:opacity-50 hover:bg-teal-700 transition-colors">
                                <Icon name="check" size={18} /> Enregistrer
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
